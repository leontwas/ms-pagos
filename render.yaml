# Blueprint de Render para api-pagos.
# En Render: New → Blueprint → seleccionar este repo. Luego completar en el dashboard
# las variables marcadas con sync:false.
services:
  - type: web
    name: api-pagos
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: node dist/main
    healthCheckPath: /pagos
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_SSL
        value: "true"
      # Connection string del Session Pooler de Supabase (IPv4, puerto 5432)
      - key: DATABASE_URL
        sync: false
      # URL pública de api-turnos en Render (confirma la reserva al cubrir la seña)
      - key: TURNOS_URL
        sync: false
